name: Validate static site

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check local links and assets
        id: site_check
        shell: bash
        run: |
          set +e
          node scripts/check-site.js > site-check.log 2>&1
          status=$?
          cat site-check.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload site-check diagnostics
        if: steps.site_check.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: site-check-diagnostics
          path: site-check.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when site check failed
        if: steps.site_check.outputs.exit_code != '0'
        run: exit 1
