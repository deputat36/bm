name: Figma homepage process purchase handoff

on:
  pull_request:
    paths:
      - "index.html"
      - "assets/css/home-polish.css"
      - "assets/css/portal-v2.tokens.css"
      - "data/design/portal-v2.tokens.json"
      - "tools/figma/portal-v2-component-runtime.mjs"
      - "tools/figma/generate-portal-v2-button-components.mjs"
      - "tools/figma/generate-portal-v2-step-card-components.mjs"
      - "tools/figma/generate-portal-v2-homepage-process-purchase-screen.mjs"
      - "tools/validate-figma-homepage-process-purchase-handoff.mjs"
      - "docs/design/FIGMA_STEP_CARD_HANDOFF.md"
      - "docs/design/FIGMA_HOMEPAGE_PROCESS_PURCHASE_HANDOFF.md"
      - ".github/workflows/figma-homepage-process-purchase-handoff.yml"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "assets/css/home-polish.css"
      - "assets/css/portal-v2.tokens.css"
      - "data/design/portal-v2.tokens.json"
      - "tools/figma/portal-v2-component-runtime.mjs"
      - "tools/figma/generate-portal-v2-button-components.mjs"
      - "tools/figma/generate-portal-v2-step-card-components.mjs"
      - "tools/figma/generate-portal-v2-homepage-process-purchase-screen.mjs"
      - "tools/validate-figma-homepage-process-purchase-handoff.mjs"
      - "docs/design/FIGMA_STEP_CARD_HANDOFF.md"
      - "docs/design/FIGMA_HOMEPAGE_PROCESS_PURCHASE_HANDOFF.md"
      - ".github/workflows/figma-homepage-process-purchase-handoff.yml"

permissions:
  contents: read

jobs:
  validate-figma-homepage-process-purchase-handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check source syntax
        run: |
          node --check tools/figma/generate-portal-v2-step-card-components.mjs
          node --check tools/figma/generate-portal-v2-homepage-process-purchase-screen.mjs
          node --check tools/validate-figma-homepage-process-purchase-handoff.mjs
      - name: Validate Homepage Process & Purchase handoff
        run: node tools/validate-figma-homepage-process-purchase-handoff.mjs
