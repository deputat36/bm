name: Temporary homepage quiz route patch

on:
  push:
    branches:
      - agent/catalog-rule-quiz

permissions:
  contents: write

jobs:
  patch-homepage:
    if: ${{ !contains(github.event.head_commit.message, '[homepage-quiz-route]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/catalog-rule-quiz
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply homepage route patch
        run: node tools/apply-homepage-quiz-route.mjs

      - name: Commit homepage route
        run: |
          if git diff --quiet -- index.html; then
            echo "No homepage changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "[homepage-quiz-route] Направить подбор главной в квиз"
          git push origin HEAD:agent/catalog-rule-quiz
