name: Figma homepage screen handoff

on:
  pull_request:
    paths:
      - "index.html"
      - "assets/css/home-polish.css"
      - "assets/css/leadgen.css"
      - "assets/js/main.js"
      - "data/design/portal-v2.tokens.json"
      - "tools/figma/portal-v2-component-runtime.mjs"
      - "tools/figma/generate-portal-v2-button-components.mjs"
      - "tools/figma/generate-portal-v2-top-navigation-components.mjs"
      - "tools/figma/generate-portal-v2-fact-card-components.mjs"
      - "tools/figma/generate-portal-v2-lead-form-card-components.mjs"
      - "tools/figma/generate-portal-v2-homepage-hero-screen.mjs"
      - "tools/validate-figma-homepage-screen-handoff.mjs"
      - "docs/design/FIGMA_HOMEPAGE_HERO_HANDOFF.md"
      - ".github/workflows/figma-homepage-screen-handoff.yml"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "assets/css/home-polish.css"
      - "assets/css/leadgen.css"
      - "assets/js/main.js"
      - "data/design/portal-v2.tokens.json"
      - "tools/figma/portal-v2-component-runtime.mjs"
      - "tools/figma/generate-portal-v2-button-components.mjs"
      - "tools/figma/generate-portal-v2-top-navigation-components.mjs"
      - "tools/figma/generate-portal-v2-fact-card-components.mjs"
      - "tools/figma/generate-portal-v2-lead-form-card-components.mjs"
      - "tools/figma/generate-portal-v2-homepage-hero-screen.mjs"
      - "tools/validate-figma-homepage-screen-handoff.mjs"
      - "docs/design/FIGMA_HOMEPAGE_HERO_HANDOFF.md"
      - ".github/workflows/figma-homepage-screen-handoff.yml"

permissions:
  contents: read

jobs:
  validate-figma-homepage-screen-handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check source syntax
        run: |
          node --check tools/figma/generate-portal-v2-homepage-hero-screen.mjs
          node --check tools/validate-figma-homepage-screen-handoff.mjs
      - name: Validate Homepage Hero screen handoff
        run: node tools/validate-figma-homepage-screen-handoff.mjs