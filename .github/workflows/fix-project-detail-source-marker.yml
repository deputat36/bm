name: Fix Project Detail source marker

on:
  push:
    branches:
      - agent/figma-project-detail-screen-handoff
    paths:
      - ".github/workflows/fix-project-detail-source-marker.yml"

permissions:
  contents: write

jobs:
  fix-source-marker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/figma-project-detail-screen-handoff
          fetch-depth: 1
          show-progress: false
      - name: Correct Project Detail source marker
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'data/design/portal-v2.source-map.json';
          const sourceMap = JSON.parse(fs.readFileSync(path, 'utf8'));
          const screen = sourceMap.screens.find((item) => item.id === 'project-detail');
          if (!screen) throw new Error('Missing project-detail screen');
          const source = screen.sources.find((item) => item.path === 'assets/js/project-verification-summary.js');
          if (!source) throw new Error('Missing project-verification-summary.js source');
          source.markers = ['data-verification-summary', 'section.dataset.verificationProfile'];
          fs.writeFileSync(path, JSON.stringify(sourceMap, null, 2) + '\n', 'utf8');
          NODE
      - name: Validate corrected source map
        run: |
          node tools/validate-figma-source-map-readiness.mjs
          node tools/validate-homepage-faq-accordion.mjs
          node tools/validate-figma-project-detail-screen-handoff.mjs
          node tools/validate-figma-catalog-screen-handoff.mjs
      - name: Commit corrected source map
        run: |
          if git diff --quiet; then
            echo "Source marker already correct"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/design/portal-v2.source-map.json
          git commit -m "Исправить source marker Project Detail"
          git push origin HEAD:agent/figma-project-detail-screen-handoff
