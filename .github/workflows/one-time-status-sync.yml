name: One-time status sync

on:
  push:
    branches:
      - docs/status-sync-20260714
    paths:
      - ".github/workflows/one-time-status-sync.yml"

permissions:
  contents: write

jobs:
  patch-status:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: docs/status-sync-20260714
          fetch-depth: 0

      - name: Synchronize portal status
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/portal/STATUS.md")
          text = path.read_text(encoding="utf-8")

          replacements = [
              ("Дата обновления: 2026-07-13", "Дата обновления: 2026-07-14"),
              ('''В исходном `assets/js/main.js` пока остаётся старое резервное значение объекта. На активных страницах оно больше не используется как фактическая привязка.

`assets/js/schema.js` сразу после загрузки `main.js`:

```text
заменяет SITE_CONFIG.defaultComplex на «Общий подбор новостройки»
исправляет созданное скрытое поле, если оно получило старое резервное значение
не изменяет формы с явно заданным data-complex
```''', '''`assets/js/main.js` теперь использует нейтральное резервное значение `defaultComplex="Общий подбор новостройки"`.

`assets/js/schema.js` сохраняет дополнительную runtime-защиту:

```text
повторно устанавливает нейтральный SITE_CONFIG.defaultComplex
исправляет скрытое поле, если оно получило старое закешированное значение
не изменяет формы с явно заданным data-complex
```

`validate:form-scope` прямо запрещает возврат резервной привязки к одному ЖК.'''),
              ("Зарегистрирован 21 маршрут четырёх очередей. Все переходные страницы:", "Зарегистрировано 24 маршрута пяти очередей. Все переходные страницы:"),
              ('''Четвёртая очередь включает:

```text
/zayavka/ → /contacts/
/zastroyschiki/bm-group/ → /developers/bm-group/
```''', '''Четвёртая очередь включает:

```text
/zayavka/ → /contacts/
/zastroyschiki/bm-group/ → /developers/bm-group/
```

Пятая очередь включает три старые статьи `/spravochnik/`, полезное содержание которых перенесено в новые страницы `/guides/`.'''),
              ('''```bash
npm run validate:priority
npm run validate:reference
npm run validate:verification
npm run validate:leads
npm run validate:form-scope
npm run validate:a11y
npm run validate:legal
npm run validate:trust
npm run validate:links
npm run validate:legacy
npm run validate:media
npm run audit:branding
```''', '''```bash
npm run validate:priority
npm run validate:reference
npm run validate:verification
npm run validate:leads
npm run validate:form-scope
npm run validate:a11y
npm run validate:dry-run
npm run validate:legal
npm run validate:trust
npm run validate:links
npm run validate:html-sitemap
npm run validate:legacy
npm run validate:media
npm run validate:utm
npm run utm:links -- --format=json
npm run audit:branding
```'''),
              ('''```text
advertising/index.html
karta-sayta/index.html
developers/bm-group/index.html
zayavka/index.html
zastroyschiki/bm-group/index.html
data/media/**
data/verification/**
все активные формы из data/pages/index.json
runtime-защиту резервной привязки
dоступность статусов, фокуса и мобильного ввода форм
```''', '''```text
advertising/index.html
karta-sayta/index.html
developers/bm-group/index.html
zayavka/index.html
zastroyschiki/bm-group/index.html
data/media/**
data/verification/**
data/marketing/**
все активные формы из data/pages/index.json
нейтральный defaultComplex и runtime-защиту
доступность статусов, фокуса и мобильного ввода форм
UTM-кампании, посадочные страницы и целевые формы
контрольную генерацию готовых рекламных ссылок
```'''),
              ('''1. Формы ещё не проверены контролируемой тестовой отправкой.
2. Мобильная доступность реализована программно, но не проверена на реальных устройствах и экранных дикторах.
3. Для Просторной 4А не сохранены точные ссылки на первичные документы.
4. Аэродромная 18Г и Сенная 76 остаются в статусе `requires_check`.
5. Справочный каталог пока не наполнен подтверждёнными объектами.
6. Семь изображений галереи требуют проверки происхождения, актуальности и разрешения на публикацию.
7. Для страниц обработки данных ещё нужно определить фактические реквизиты владельца и провести юридическую проверку.
8. Формат серверных редиректов пока не определён.
9. GitHub-коннектор не показывает результат push workflow для последних коммитов.
10. Старое значение остаётся непосредственно в `main.js`; активные страницы защищены через `schema.js`, но прямое подключение `main.js` без `schema.js` запрещено валидатором.''', '''1. Формы ещё не проверены контролируемой реальной тестовой отправкой.
2. Мобильная доступность реализована программно, но не проверена на реальных устройствах и экранных дикторах.
3. Для Просторной 4А не сохранены точные ссылки на первичные документы.
4. Аэродромная 18Г и Сенная 76 остаются в статусе `requires_check`.
5. Справочный каталог пока не наполнен подтверждёнными объектами.
6. Семь изображений галереи требуют проверки происхождения, актуальности и разрешения на публикацию.
7. Для страниц обработки данных ещё нужно определить фактические реквизиты владельца и провести юридическую проверку.
8. Формат серверных редиректов пока не определён.'''),
              ('''1. Сохранить точные ссылки на карточку ЕИСЖС, актуальную декларацию и разрешение Просторной 4А.
2. Сверить critical claims по первичным источникам.
3. Получить подтверждение происхождения и прав на семь визуализаций.
4. Провести ручную мобильную проверку форм и CTA.
5. Провести контролируемый тест формы `/contacts/`.
6. Собрать источники по другим новостройкам города.
7. Определить платформу размещения и правила редиректов.
8. Позже очистить исходную константу `defaultComplex` в `main.js`, сохранив runtime-защиту как дополнительный предохранитель.''', '''1. Сохранить точные ссылки на карточку ЕИСЖС, актуальную декларацию и разрешение Просторной 4А.
2. Сверить critical claims по первичным источникам.
3. Получить подтверждение происхождения и прав на семь визуализаций.
4. Провести ручную мобильную проверку форм и CTA через безопасный dry-run.
5. После согласования провести одну реальную тестовую отправку формы `/contacts/`.
6. Собрать источники по другим новостройкам города.
7. Определить платформу размещения и правила редиректов.
8. Подготовить фактические рекламные ссылки и QR-коды из проверенного UTM-реестра.'''),
              ('''docs/portal/PROJECT_VERIFICATION_WORKFLOW.md
docs/portal/FORM_ACCESSIBILITY_AND_MOBILE_QA.md''', '''docs/portal/PROJECT_VERIFICATION_WORKFLOW.md
docs/portal/FORM_ACCESSIBILITY_AND_MOBILE_QA.md
docs/portal/LEAD_DRY_RUN_QA.md
docs/portal/UTM_CAMPAIGNS.md''')
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one STATUS block, found {count}: {old[:80]!r}")
              text = text.replace(old, new, 1)

          marker = "## Автоматические проверки"
          section = '''## Рекламные кампании и готовые ссылки

Реестр:

```text
data/marketing/utm-campaigns.json
```

Он содержит активные кампании для общего каталога, Просторной 4А, Аэродромной 18Г, Сенной 76, офлайн QR и ипотечной консультации. Каждая запись связана с объектом, посадочной страницей, `form_id`, `lead_type`, целью и сценарием обработки.

Генератор:

```bash
npm run utm:links
npm run utm:links -- --format=json
npm run utm:links -- --format=csv
```

Portal guards проверяет реестр и выполняет контрольную генерацию JSON.

'''
          if text.count(marker) != 1:
              raise SystemExit("Automatic checks marker not found exactly once")
          text = text.replace(marker, section + marker, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit synchronized status
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/portal/STATUS.md
          git diff --cached --quiet && exit 0
          git commit -m "Синхронизировать статус портала"
          git push origin HEAD:docs/status-sync-20260714
