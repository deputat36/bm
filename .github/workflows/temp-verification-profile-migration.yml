name: Temporary verification profile migration

on:
  push:
    branches:
      - agent/object-verification-profiles

permissions:
  contents: write

jobs:
  migrate-profile:
    if: ${{ !contains(github.event.head_commit.message, '[verification-profile-migrated]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/object-verification-profiles
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply profile migration
        run: node tools/apply-verification-profile-contract-migration.mjs

      - name: Commit migrated profile
        run: |
          if git diff --quiet -- data/verification/prostornaya-4a.json; then
            echo "No profile changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/verification/prostornaya-4a.json
          git commit -m "[verification-profile-migrated] Обновить профиль Просторной 4А до schema 1.1"
          git push origin HEAD:agent/object-verification-profiles