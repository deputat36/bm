name: Figma atomic components handoff

on:
  pull_request:
    paths:
      - "data/design/portal-v2.tokens.json"
      - "assets/css/portal-v2.tokens.css"
      - "assets/css/project-conversion.css"
      - "assets/css/leadgen.css"
      - "assets/js/main.js"
      - "tools/figma/portal-v2-component-runtime.mjs"
      - "tools/figma/generate-portal-v2-foundations.mjs"
      - "tools/figma/generate-portal-v2-button-components.mjs"
      - "tools/figma/generate-portal-v2-verification-status-components.mjs"
      - "tools/figma/generate-portal-v2-form-field-components.mjs"
      - "tools/figma/generate-portal-v2-faq-accordion-components.mjs"
      - "tools/figma/generate-portal-v2-brand-components.mjs"
      - "tools/figma/generate-portal-v2-top-navigation-components.mjs"
      - "tools/figma/generate-portal-v2-project-card-components.mjs"
      - "tools/figma/generate-portal-v2-fact-card-components.mjs"
      - "tools/figma/generate-portal-v2-lead-form-card-components.mjs"
      - "tools/figma/generate-portal-v2-scenario-card-components.mjs"
      - "tools/figma/generate-portal-v2-content-card-components.mjs"
      - "tools/figma/generate-portal-v2-step-card-components.mjs"
      - "tools/figma/generate-portal-v2-link-card-components.mjs"
      - "tools/figma/generate-portal-v2-site-footer-components.mjs"
      - "tools/validate-figma-atomic-components-handoff.mjs"
      - "docs/design/FIGMA_ATOMIC_COMPONENTS_HANDOFF.md"
      - "docs/design/FIGMA_FACT_CARD_HANDOFF.md"
      - "docs/design/FIGMA_LEAD_FORM_CARD_HANDOFF.md"
      - "docs/design/FIGMA_SCENARIO_CARD_HANDOFF.md"
      - "docs/design/FIGMA_CONTENT_CARD_HANDOFF.md"
      - "docs/design/FIGMA_STEP_CARD_HANDOFF.md"
      - "docs/design/FIGMA_LINK_CARD_HANDOFF.md"
      - "docs/design/FIGMA_SITE_FOOTER_HANDOFF.md"
      - "docs/design/FIGMA_FOUNDATIONS_HANDOFF.md"
      - ".github/workflows/figma-atomic-components-handoff.yml"
  push:
    branches:
      - main
    paths:
      - "data/design/portal-v2.tokens.json"
      - "assets/css/portal-v2.tokens.css"
      - "assets/css/project-conversion.css"
      - "assets/css/leadgen.css"
      - "assets/js/main.js"
      - "tools/figma/portal-v2-component-runtime.mjs"
      - "tools/figma/generate-portal-v2-foundations.mjs"
      - "tools/figma/generate-portal-v2-button-components.mjs"
      - "tools/figma/generate-portal-v2-verification-status-components.mjs"
      - "tools/figma/generate-portal-v2-form-field-components.mjs"
      - "tools/figma/generate-portal-v2-faq-accordion-components.mjs"
      - "tools/figma/generate-portal-v2-brand-components.mjs"
      - "tools/figma/generate-portal-v2-top-navigation-components.mjs"
      - "tools/figma/generate-portal-v2-project-card-components.mjs"
      - "tools/figma/generate-portal-v2-fact-card-components.mjs"
      - "tools/figma/generate-portal-v2-lead-form-card-components.mjs"
      - "tools/figma/generate-portal-v2-scenario-card-components.mjs"
      - "tools/figma/generate-portal-v2-content-card-components.mjs"
      - "tools/figma/generate-portal-v2-step-card-components.mjs"
      - "tools/figma/generate-portal-v2-link-card-components.mjs"
      - "tools/figma/generate-portal-v2-site-footer-components.mjs"
      - "tools/validate-figma-atomic-components-handoff.mjs"
      - "docs/design/FIGMA_ATOMIC_COMPONENTS_HANDOFF.md"
      - "docs/design/FIGMA_FACT_CARD_HANDOFF.md"
      - "docs/design/FIGMA_LEAD_FORM_CARD_HANDOFF.md"
      - "docs/design/FIGMA_SCENARIO_CARD_HANDOFF.md"
      - "docs/design/FIGMA_CONTENT_CARD_HANDOFF.md"
      - "docs/design/FIGMA_STEP_CARD_HANDOFF.md"
      - "docs/design/FIGMA_LINK_CARD_HANDOFF.md"
      - "docs/design/FIGMA_SITE_FOOTER_HANDOFF.md"
      - "docs/design/FIGMA_FOUNDATIONS_HANDOFF.md"
      - ".github/workflows/figma-atomic-components-handoff.yml"

permissions:
  contents: read

jobs:
  validate-figma-atomic-components-handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check source syntax
        run: |
          node --check tools/figma/portal-v2-component-runtime.mjs
          node --check tools/figma/generate-portal-v2-foundations.mjs
          node --check tools/figma/generate-portal-v2-button-components.mjs
          node --check tools/figma/generate-portal-v2-verification-status-components.mjs
          node --check tools/figma/generate-portal-v2-form-field-components.mjs
          node --check tools/figma/generate-portal-v2-faq-accordion-components.mjs
          node --check tools/figma/generate-portal-v2-brand-components.mjs
          node --check tools/figma/generate-portal-v2-top-navigation-components.mjs
          node --check tools/figma/generate-portal-v2-project-card-components.mjs
          node --check tools/figma/generate-portal-v2-fact-card-components.mjs
          node --check tools/figma/generate-portal-v2-lead-form-card-components.mjs
          node --check tools/figma/generate-portal-v2-scenario-card-components.mjs
          node --check tools/figma/generate-portal-v2-content-card-components.mjs
          node --check tools/figma/generate-portal-v2-step-card-components.mjs
          node --check tools/figma/generate-portal-v2-link-card-components.mjs
          node --check tools/figma/generate-portal-v2-site-footer-components.mjs
          node --check tools/validate-figma-atomic-components-handoff.mjs
      - name: Validate component runtime
        run: node tools/validate-figma-atomic-components-handoff.mjs runtime
      - name: Validate established component families
        run: |
          for target in button status field faq brand navigation project fact lead scenario content step link; do
            node tools/validate-figma-atomic-components-handoff.mjs "$target"
          done
      - name: Validate Site Footer generation contract
        run: node tools/validate-figma-atomic-components-handoff.mjs footer generation
      - name: Validate Site Footer API contract
        run: node tools/validate-figma-atomic-components-handoff.mjs footer api
      - name: Validate Site Footer variant axes
        run: node tools/validate-figma-atomic-components-handoff.mjs footer variants
      - name: Validate Site Footer token bindings
        run: node tools/validate-figma-atomic-components-handoff.mjs footer tokens
      - name: Validate Site Footer generated syntax
        run: node tools/validate-figma-atomic-components-handoff.mjs footer syntax
      - name: Validate handoff documentation
        run: node tools/validate-figma-atomic-components-handoff.mjs docs
      - name: Validate complete component set
        run: node tools/validate-figma-atomic-components-handoff.mjs all
