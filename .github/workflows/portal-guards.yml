  pull_request:
    paths:
      - "index.html"
      - "catalog/**"
      - "developers/**"
      - "guides/**"
      - "news/**"
      - "contacts/**"
      - "ipoteka/**"
      - "spasibo/**"
      - "about/**"
      - "sources/**"
      - "legal/**"
      - "privacy/**"
      - "personal-data-consent/**"
      - "advertising/**"
      - "karta-sayta/**"
      - "portal-preview/**"
      - "novostroyki/**"
      - "zhk/**"
      - "zastroyschiki/**"
      - "spravochnik/**"
      - "novosti/**"
      - "prostornaya-4a/**"
      - "o-zhk/**"
      - "kvartiry/**"
      - "planirovki/**"
      - "ceny/**"
      - "dokumenty/**"
      - "galereya/**"
      - "infrastruktura/**"
      - "hod-stroitelstva/**"
      - "zastroyschik/**"
      - "proektnaya-deklaratsiya-36-001139/**"
      - "faq/**"
      - "zayavka/**"
      - "assets/css/**"
      - "assets/js/**"
      - "data/pages/**"
      - "data/projects/**"
      - "data/research/**"
      - "data/migration/**"
      - "data/media/**"
      - "data/verification/**"
      - "data/marketing/**"
      - "docs/portal/**"
      - "tools/**"
      - "scripts/**"
      - "sitemap.xml"
      - "robots.txt"
      - "package.json"
      - ".github/workflows/portal-guards.yml"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-portal:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/main.js
          node --check assets/js/schema.js
          node --check assets/js/priority-leads.js
          node --check assets/js/reference-catalog.js
          node --check assets/js/mobile-lead-bar.js
          node --check assets/js/conversion-tracking.js
          node --check assets/js/form-accessibility.js
          node --check assets/js/gallery.js
          node --check tools/validate-priority-projects.mjs
          node --check tools/validate-reference-projects.mjs
          node --check tools/validate-portal-lead-forms.mjs
          node --check tools/validate-homepage-object-cta.mjs
          node --check tools/validate-catalog-conversion.mjs
          node --check tools/validate-contacts-conversion.mjs
          node --check tools/validate-mortgage-conversion.mjs
          node --check tools/validate-form-role-analytics.mjs
          node --check tools/validate-thankyou-context.mjs
          node --check tools/validate-active-form-scope.mjs
          node --check tools/validate-form-accessibility.mjs
          node --check tools/validate-lead-dry-run.mjs
          node --check tools/validate-legal-copy.mjs
          node --check tools/validate-portal-links.mjs
          node --check tools/validate-html-sitemap.mjs
          node --check tools/validate-legacy-routes.mjs
          node --check tools/validate-trust-pages.mjs
          node --check tools/validate-media-inventory.mjs
          node --check tools/validate-project-verification.mjs
          node --check tools/validate-utm-campaigns.mjs
          node --check tools/build-utm-links.mjs
          node --check tools/audit-portal-branding.mjs
          node --check scripts/check-site.js

      - name: Validate priority lead projects
        run: npm run validate:priority

      - name: Validate portal lead forms
        run: npm run validate:leads

      - name: Validate homepage object CTAs
        run: npm run validate:homepage-cta

      - name: Validate catalog conversion
        run: npm run validate:catalog-conversion

      - name: Validate contacts conversion
        run: npm run validate:contacts-conversion

      - name: Validate mortgage conversion
        run: npm run validate:mortgage-conversion

      - name: Validate form role analytics
        run: npm run validate:form-roles

      - name: Validate thank-you attribution
        run: npm run validate:thankyou

      - name: Validate active lead form scope
        run: npm run validate:form-scope

      - name: Validate lead form accessibility
        run: npm run validate:a11y

      - name: Validate lead dry-run mode
        run: npm run validate:dry-run

      - name: Validate reference catalog
        run: npm run validate:reference

      - name: Validate project verification register
        run: npm run validate:verification

      - name: Validate legal copy
        run: npm run validate:legal

      - name: Validate trust pages
        run: npm run validate:trust

      - name: Validate core portal links
        run: npm run validate:links

      - name: Validate HTML sitemap coverage
        run: npm run validate:html-sitemap

      - name: Validate legacy migration routes
        run: npm run validate:legacy

      - name: Validate media inventory
        run: npm run validate:media

      - name: Validate UTM campaigns
        run: npm run validate:utm

      - name: Generate UTM links preview
        run: |
          node tools/build-utm-links.mjs --format=json > /tmp/utm-links.json
          node -e 'const fs=require("fs"); const rows=JSON.parse(fs.readFileSync("/tmp/utm-links.json","utf8")); if(!Array.isArray(rows)||rows.length===0) process.exit(1); console.log(`Generated UTM links: ${rows.length}`);'

      - name: Audit portal branding
        run: npm run audit:branding
