name: Lead lifecycle guard

on:
  push:
    branches: [main]
    paths:
      - "data/operations/lead-lifecycle.json"
      - "data/operations/lead-handling.json"
      - "data/qa/form-scenarios.json"
      - "docs/portal/LEAD_LIFECYCLE_CONTRACT.md"
      - "docs/portal/LEAD_OPERATIONS_RUNBOOK.md"
      - "supabase/functions/newbuild-lead/index.ts"
      - "supabase/migrations/*newbuild_lead_operations*.sql"
      - "tools/validate-lead-lifecycle.mjs"
      - "tools/build-lead-lifecycle-report.mjs"
      - ".github/workflows/lead-lifecycle-guard.yml"
  pull_request:
    paths:
      - "data/operations/lead-lifecycle.json"
      - "data/operations/lead-handling.json"
      - "data/qa/form-scenarios.json"
      - "docs/portal/LEAD_LIFECYCLE_CONTRACT.md"
      - "docs/portal/LEAD_OPERATIONS_RUNBOOK.md"
      - "supabase/functions/newbuild-lead/index.ts"
      - "supabase/migrations/*newbuild_lead_operations*.sql"
      - "tools/validate-lead-lifecycle.mjs"
      - "tools/build-lead-lifecycle-report.mjs"
      - ".github/workflows/lead-lifecycle-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-lead-lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check scripts
        run: |
          node --check tools/validate-lead-lifecycle.mjs
          node --check tools/build-lead-lifecycle-report.mjs

      - name: Validate lead lifecycle
        run: node tools/validate-lead-lifecycle.mjs

      - name: Generate lifecycle report
        run: |
          node tools/build-lead-lifecycle-report.mjs --format=json > /tmp/lead-lifecycle.json
          node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync("/tmp/lead-lifecycle.json","utf8")); if(data.status!=="server_connected_owner_activation_pending"||data.summary?.states!==12||data.summary?.transitions!==18||data.summary?.terminal_states!==4||data.summary?.nonterminal_states!==8||data.rules?.system_of_record_available!==true||data.rules?.automatic_transition_enabled!==true||data.rules?.automatic_triage_only!==true||data.rules?.automatic_owner_assignment_enabled!==false) process.exit(1); console.log(`Generated lifecycle states: ${data.summary.states}; automatic triage only: ${data.rules.automatic_triage_only}`);'