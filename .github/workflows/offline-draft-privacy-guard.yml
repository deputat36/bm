name: Offline draft privacy guard

on:
  pull_request:
    paths:
      - "assets/js/main.js"
      - "assets/js/schema.js"
      - "tools/validate-offline-draft-privacy.mjs"
      - "docs/portal/OFFLINE_DRAFT_PRIVACY.md"
      - ".github/workflows/offline-draft-privacy-guard.yml"
  push:
    branches:
      - main
    paths:
      - "assets/js/main.js"
      - "assets/js/schema.js"
      - "tools/validate-offline-draft-privacy.mjs"
      - "docs/portal/OFFLINE_DRAFT_PRIVACY.md"
      - ".github/workflows/offline-draft-privacy-guard.yml"

permissions:
  contents: read

jobs:
  validate-offline-draft-privacy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/main.js
          node --check assets/js/schema.js
          node --check tools/validate-offline-draft-privacy.mjs

      - name: Validate offline draft privacy
        run: node tools/validate-offline-draft-privacy.mjs
