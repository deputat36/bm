name: Apply Figma catalog screen handoff

on:
  push:
    branches:
      - agent/figma-catalog-screen-handoff
    paths:
      - "tools/apply-figma-catalog-screen-handoff.mjs"
      - "tools/validate-figma-catalog-screen-handoff.mjs"
      - ".github/workflows/apply-figma-catalog-screen-handoff.yml"
  pull_request:
    branches:
      - main
    paths:
      - "tools/apply-figma-catalog-screen-handoff.mjs"
      - "tools/validate-figma-catalog-screen-handoff.mjs"
      - ".github/workflows/apply-figma-catalog-screen-handoff.yml"
      - "tools/figma/generate-portal-v2-catalog-screen.mjs"
      - "docs/design/FIGMA_CATALOG_SCREEN_HANDOFF.md"

permissions:
  contents: write

jobs:
  apply-catalog-handoff:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'agent/figma-catalog-screen-handoff'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/figma-catalog-screen-handoff
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check migration syntax
        run: node --check tools/apply-figma-catalog-screen-handoff.mjs
      - name: Apply Catalog handoff integration
        run: node tools/apply-figma-catalog-screen-handoff.mjs
      - name: Commit generated integration
        run: |
          if git diff --quiet; then
            echo "Catalog handoff integration is already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/build-figma-execution-pack.mjs tools/validate-figma-execution-pack.mjs tools/build-figma-visual-qa-pack.mjs tools/validate-figma-visual-qa-pack.mjs data/design/portal-v2.source-map.json tools/validate-figma-source-map-readiness.mjs docs/design/FIGMA_EXECUTION_PACK.md docs/design/FIGMA_VISUAL_QA_PACK.md docs/design/FIGMA_SOURCE_MAP_AND_CODE_CONNECT_READINESS.md
          git commit -m "Интегрировать экран каталога в Figma handoff"
          git push origin HEAD:agent/figma-catalog-screen-handoff
      - name: Validate Catalog screen handoff
        id: catalog_validation
        shell: bash
        run: |
          set +e
          node tools/validate-figma-catalog-screen-handoff.mjs > catalog-validator.log 2>&1
          status=$?
          cat catalog-validator.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Catalog validator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-validator-log
          path: catalog-validator.log
          retention-days: 1
      - name: Commit diagnostic log on failure
        if: steps.catalog_validation.outputs.status != '0'
        run: |
          mkdir -p build/debug
          cp catalog-validator.log build/debug/catalog-validator.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f build/debug/catalog-validator.log
          git commit -m "Сохранить диагностику Catalog validator"
          git push origin HEAD:agent/figma-catalog-screen-handoff
      - name: Stop on Catalog validation failure
        if: steps.catalog_validation.outputs.status != '0'
        run: exit 1
      - name: Validate execution pack
        run: node tools/validate-figma-execution-pack.mjs
      - name: Validate visual QA pack
        run: node tools/validate-figma-visual-qa-pack.mjs
      - name: Validate source map readiness
        run: node tools/validate-figma-source-map-readiness.mjs
      - name: Commit validation success marker
        run: |
          mkdir -p build/debug
          printf '%s\n' \
            'Catalog screen handoff: passed' \
            'Execution Pack: passed' \
            'Visual QA Pack: passed' \
            'Source map readiness: passed' \
            > build/debug/catalog-validation-success.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f build/debug/catalog-validation-success.txt
          git commit -m "Подтвердить Catalog validators"
          git push origin HEAD:agent/figma-catalog-screen-handoff
