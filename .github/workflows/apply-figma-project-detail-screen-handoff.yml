name: Apply Figma project detail screen handoff

on:
  push:
    branches:
      - agent/figma-project-detail-screen-handoff
    paths:
      - "tools/apply-figma-project-detail-screen-handoff.mjs"
      - "tools/apply-figma-project-detail-workflow-counts.mjs"
      - ".github/workflows/apply-figma-project-detail-screen-handoff.yml"
  pull_request:
    branches:
      - main
    paths:
      - "tools/apply-figma-project-detail-screen-handoff.mjs"
      - "tools/apply-figma-project-detail-workflow-counts.mjs"
      - ".github/workflows/apply-figma-project-detail-screen-handoff.yml"

permissions:
  contents: write

jobs:
  apply-project-detail-handoff:
    if: github.head_ref == '' || github.head_ref == 'agent/figma-project-detail-screen-handoff'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/figma-project-detail-screen-handoff
          fetch-depth: 1
          show-progress: false
      - name: Apply Project Detail handoff integration
        id: apply
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/apply-figma-project-detail-screen-handoff.mjs')
          content = path.read_text(encoding='utf-8')
          content = content.replace('Execution Pack must finish with Catalog', 'Execution pack must finish with Catalog')
          path.write_text(content, encoding='utf-8')
          PY
          status=0
          : > project-detail-migration.log
          node --check tools/apply-figma-project-detail-screen-handoff.mjs >> project-detail-migration.log 2>&1 || status=$?
          if [ "$status" -eq 0 ]; then node --check tools/apply-figma-project-detail-workflow-counts.mjs >> project-detail-migration.log 2>&1 || status=$?; fi
          if [ "$status" -eq 0 ]; then node tools/apply-figma-project-detail-screen-handoff.mjs >> project-detail-migration.log 2>&1 || status=$?; fi
          if [ "$status" -eq 0 ]; then node tools/apply-figma-project-detail-workflow-counts.mjs >> project-detail-migration.log 2>&1 || status=$?; fi
          cat project-detail-migration.log
          echo "$status" > project-detail-migration.status
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: Upload migration diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-detail-migration-diagnostic
          path: |
            project-detail-migration.log
            project-detail-migration.status
          if-no-files-found: error
          retention-days: 7
      - name: Stop after migration failure
        if: steps.apply.outputs.status != '0'
        run: exit 1
      - name: Validate integrated result
        run: |
          node tools/validate-figma-project-detail-screen-handoff.mjs
          node tools/validate-figma-execution-pack.mjs
          node tools/validate-figma-visual-qa-pack.mjs
          node tools/validate-figma-source-map-readiness.mjs
      - name: Commit generated changes
        run: |
          git restore tools/apply-figma-project-detail-screen-handoff.mjs
          if git diff --quiet; then
            echo "Project Detail handoff integration is already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/build-figma-execution-pack.mjs tools/validate-figma-execution-pack.mjs tools/build-figma-visual-qa-pack.mjs tools/validate-figma-visual-qa-pack.mjs data/design/portal-v2.source-map.json tools/validate-figma-source-map-readiness.mjs docs/design/FIGMA_EXECUTION_PACK.md docs/design/FIGMA_VISUAL_QA_PACK.md docs/design/FIGMA_SOURCE_MAP_AND_CODE_CONNECT_READINESS.md .github/workflows/figma-execution-pack.yml .github/workflows/figma-visual-qa-pack.yml
          git commit -m "Интегрировать Project Detail в Figma handoff"
          git push origin HEAD:agent/figma-project-detail-screen-handoff
