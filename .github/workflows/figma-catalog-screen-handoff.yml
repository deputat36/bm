name: Figma catalog screen handoff

on:
  pull_request:
    paths:
      - "catalog/index.html"
      - "assets/js/catalog-rule-quiz.js"
      - "data/design/portal-v2.source-map.json"
      - "docs/design/FIGMA_CATALOG_SCREEN_HANDOFF.md"
      - "docs/design/FIGMA_EXECUTION_PACK.md"
      - "docs/design/FIGMA_VISUAL_QA_PACK.md"
      - "docs/design/FIGMA_SOURCE_MAP_AND_CODE_CONNECT_READINESS.md"
      - "tools/figma/generate-portal-v2-catalog-screen.mjs"
      - "tools/build-figma-execution-pack.mjs"
      - "tools/validate-figma-execution-pack.mjs"
      - "tools/build-figma-visual-qa-pack.mjs"
      - "tools/validate-figma-visual-qa-pack.mjs"
      - "tools/validate-figma-source-map-readiness.mjs"
      - "tools/validate-figma-catalog-screen-handoff.mjs"
      - ".github/workflows/figma-catalog-screen-handoff.yml"
  push:
    branches:
      - main
    paths:
      - "catalog/index.html"
      - "assets/js/catalog-rule-quiz.js"
      - "data/design/portal-v2.source-map.json"
      - "docs/design/FIGMA_CATALOG_SCREEN_HANDOFF.md"
      - "docs/design/FIGMA_EXECUTION_PACK.md"
      - "docs/design/FIGMA_VISUAL_QA_PACK.md"
      - "docs/design/FIGMA_SOURCE_MAP_AND_CODE_CONNECT_READINESS.md"
      - "tools/figma/generate-portal-v2-catalog-screen.mjs"
      - "tools/build-figma-execution-pack.mjs"
      - "tools/validate-figma-execution-pack.mjs"
      - "tools/build-figma-visual-qa-pack.mjs"
      - "tools/validate-figma-visual-qa-pack.mjs"
      - "tools/validate-figma-source-map-readiness.mjs"
      - "tools/validate-figma-catalog-screen-handoff.mjs"
      - ".github/workflows/figma-catalog-screen-handoff.yml"

permissions:
  contents: read

jobs:
  validate-figma-catalog-screen-handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check source syntax
        run: |
          node --check tools/figma/generate-portal-v2-catalog-screen.mjs
          node --check tools/validate-figma-catalog-screen-handoff.mjs
      - name: Validate catalog screen handoff
        run: node tools/validate-figma-catalog-screen-handoff.mjs
      - name: Validate execution pack
        run: node tools/validate-figma-execution-pack.mjs
      - name: Validate visual QA pack
        run: node tools/validate-figma-visual-qa-pack.mjs
      - name: Validate source map readiness
        run: node tools/validate-figma-source-map-readiness.mjs
      - name: Check generated payload size
        run: |
          # Final synchronized PR-head check: all four validators and size limit must agree.
          node tools/figma/generate-portal-v2-catalog-screen.mjs > /tmp/catalog-screen.js
          characters=$(wc -m < /tmp/catalog-screen.js)
          bytes=$(wc -c < /tmp/catalog-screen.js)
          echo "Catalog payload: ${characters} characters / ${bytes} bytes"
          test "$characters" -le 50000
