name: Temporary homepage verification patch

on:
  push:
    branches:
      - agent/homepage-verification-safety

permissions:
  contents: write

jobs:
  patch-homepage:
    if: ${{ !contains(github.event.head_commit.message, '[homepage-safe-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/homepage-verification-safety
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply focused patch
        run: node tools/apply-homepage-verification-safety.mjs

      - name: Commit patched homepage
        run: |
          if git diff --quiet -- index.html; then
            echo "No homepage changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "[homepage-safe-patched] Убрать неподтверждённые характеристики с главной"
          git push origin HEAD:agent/homepage-verification-safety