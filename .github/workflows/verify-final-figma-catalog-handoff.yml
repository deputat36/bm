name: Verify final Figma catalog handoff

on:
  push:
    branches:
      - agent/figma-catalog-screen-handoff
    paths:
      - ".github/workflows/verify-final-figma-catalog-handoff.yml"

permissions:
  contents: write

jobs:
  verify-final-catalog-handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout final branch
        uses: actions/checkout@v4
        with:
          ref: agent/figma-catalog-screen-handoff
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run all final validators
        id: validations
        shell: bash
        run: |
          set +e
          mkdir -p build/debug

          node tools/validate-figma-catalog-screen-handoff.mjs > build/debug/catalog-screen.log 2>&1
          catalog_status=$?

          node tools/validate-figma-execution-pack.mjs > build/debug/execution-pack.log 2>&1
          execution_status=$?

          node tools/validate-figma-visual-qa-pack.mjs > build/debug/visual-qa.log 2>&1
          visual_status=$?

          node tools/validate-figma-source-map-readiness.mjs > build/debug/source-map.log 2>&1
          source_status=$?

          node tools/figma/generate-portal-v2-catalog-screen.mjs > /tmp/catalog-screen.js 2> build/debug/generator.log
          generator_status=$?
          characters=$(wc -m < /tmp/catalog-screen.js)
          bytes=$(wc -c < /tmp/catalog-screen.js)
          size_status=0
          if [ "$characters" -gt 50000 ]; then size_status=1; fi

          {
            echo "catalog_screen=$catalog_status"
            echo "execution_pack=$execution_status"
            echo "visual_qa=$visual_status"
            echo "source_map=$source_status"
            echo "generator=$generator_status"
            echo "payload_characters=$characters"
            echo "payload_bytes=$bytes"
            echo "payload_size=$size_status"
          } > build/debug/final-catalog-validation.txt

          cat build/debug/final-catalog-validation.txt
          echo "failed=$((catalog_status || execution_status || visual_status || source_status || generator_status || size_status))" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit validation report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f build/debug/final-catalog-validation.txt build/debug/catalog-screen.log build/debug/execution-pack.log build/debug/visual-qa.log build/debug/source-map.log build/debug/generator.log
          git commit -m "Сохранить финальную проверку Catalog handoff"
          git push origin HEAD:agent/figma-catalog-screen-handoff
      - name: Stop on validator failure
        if: steps.validations.outputs.failed != '0'
        run: exit 1
