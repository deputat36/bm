name: Analytics delivery consistency guard

on:
  pull_request:
    paths:
      - "assets/js/main.js"
      - "assets/js/mobile-lead-bar.js"
      - "assets/js/schema.js"
      - "data/analytics/events.json"
      - "tools/validate-analytics-delivery-consistency.mjs"
      - "tools/validate-internal-lead-id-privacy.mjs"
      - "docs/portal/ANALYTICS_DELIVERY_CONSISTENCY.md"
      - ".github/workflows/analytics-delivery-consistency-guard.yml"
  push:
    branches:
      - main
    paths:
      - "assets/js/main.js"
      - "assets/js/mobile-lead-bar.js"
      - "assets/js/schema.js"
      - "data/analytics/events.json"
      - "tools/validate-analytics-delivery-consistency.mjs"
      - "tools/validate-internal-lead-id-privacy.mjs"
      - "docs/portal/ANALYTICS_DELIVERY_CONSISTENCY.md"
      - ".github/workflows/analytics-delivery-consistency-guard.yml"

permissions:
  contents: read

jobs:
  validate-analytics-delivery-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/main.js
          node --check assets/js/mobile-lead-bar.js
          node --check tools/validate-analytics-delivery-consistency.mjs
          node --check tools/validate-internal-lead-id-privacy.mjs

      - name: Validate analytics delivery consistency
        run: node tools/validate-analytics-delivery-consistency.mjs

      - name: Validate internal lead ID privacy
        run: node tools/validate-internal-lead-id-privacy.mjs