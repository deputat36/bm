<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Подбор квартиры — ЖК Теллерманов сад</title><meta name="robots" content="noindex, follow"><link rel="stylesheet" href="../assets/css/styles.css"><link rel="stylesheet" href="../assets/css/responsive.css"></head><body><main><section class="cta"><div class="container lead-panel"><div><span class="eyebrow">Подбор</span><h1>Подобрать квартиру</h1><p class="lead">Заполните форму, если рассматриваете покупку квартиры в ЖК «Теллерманов сад».</p><ul class="list"><li>выберите тип квартиры;</li><li>укажите бюджет или способ покупки;</li><li>оставьте телефон для связи.</li></ul></div><form class="form" data-lead-form><label>Имя<input name="name" required></label><label>Телефон<input name="phone" required></label><label>Квартира<select name="interest" required><option value="">Выберите</option><option>Студия</option><option>1-комнатная квартира</option><option>2-комнатная квартира</option><option>3-комнатная квартира</option><option>Нужна консультация</option></select></label><label>Бюджет или способ покупки<textarea name="comment" required placeholder="Ипотека, маткапитал, наличные, продажа своей квартиры"></textarea></label><button class="button" type="submit">Отправить заявку</button><div class="form__status" data-form-status></div></form></div></section></main><script src="../assets/js/main.js"></script></body></html>
